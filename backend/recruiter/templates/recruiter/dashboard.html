<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Dashboard</title>
</head>
<body>

<h1>AI Recruitment System</h1>

<hr>

<h2>Dashboard</h2>

<p>Total Jobs: {{ total_jobs }}</p>

<p>Total Resumes: {{ total_resumes }}</p>

<hr>

<h2>Available Jobs</h2>

<table border="1" cellpadding="8">
    <tr>
        <th>Title</th>
        <th>Department</th>
        <th>Location</th>
        <th>Status</th>
    </tr>

    {% for job in jobs %}
    <tr>
        <td>{{ job.title }}</td>
        <td>{{ job.department }}</td>
        <td>{{ job.location }}</td>
        <td>{{ job.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No jobs available.</td>
    </tr>
    {% endfor %}
</table>

</body>
</html>
